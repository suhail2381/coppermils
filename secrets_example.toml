# Copy this structure into Streamlit Cloud: Settings -> Secrets
# (or into a local .streamlit/secrets.toml that is gitignored — never commit
# the real version of this file to GitHub).
#
# Add / remove staff accounts here. Roles control what each person can see:
#   Admin              -> full access to every page
#   Production Manager -> raw materials, production, scrap, staff, reports
#   Sales               -> product pricing (view), orders, customers, reports
# The public storefront needs NO login at all — customers use it directly.

[users.admin]
password = "REPLACE-WITH-A-STRONG-PASSWORD"
role = "Admin"
display_name = "Owner / Admin"

[users.manager]
password = "REPLACE-WITH-A-STRONG-PASSWORD"
role = "Production Manager"
display_name = "Production Manager"

[users.sales]
password = "REPLACE-WITH-A-STRONG-PASSWORD"
role = "Sales"
display_name = "Sales Staff"
